name: Release Go Installer

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build & Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: installer/go.mod

      - name: Populate embedded flake directory
        run: |
          # Mirror what parts/go-installer.nix does — assemble flake source
          # into installer/flake/ so //go:embed picks it up
          rm -rf installer/flake/*

          cp flake.nix            installer/flake/
          cp flake.lock           installer/flake/
          cp README.md            installer/flake/
          cp -r hosts             installer/flake/hosts
          cp -r home              installer/flake/home
          cp -r modules           installer/flake/modules
          cp -r parts             installer/flake/parts
          cp -r assets            installer/flake/assets

      - name: Build
        working-directory: installer
        env:
          CGO_ENABLED: '0'
          GOOS: linux
          GOARCH: amd64
        run: |
          go build -ldflags="-s -w" -o snowflake-installer .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: installer/snowflake-installer
          fail_on_unmatched_files: true
