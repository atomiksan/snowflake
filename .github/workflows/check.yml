name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  flake-check:
    name: Nix Flake Evaluation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v30
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes pipe-operators

      - name: Evaluate flake
        run: nix flake check --no-build --all-systems

      - name: Show flake outputs
        run: nix flake show

  rust-ci:
    name: Rust Lint, Format & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: installer-rs

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            installer-rs/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('installer-rs/Cargo.lock') }}

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy (lint)
        run: cargo clippy -- -D warnings

      - name: Build
        run: cargo build --release

      - name: Verify Cargo.lock is up to date
        run: |
          cargo update --dry-run 2>&1
          echo "✅ Cargo.lock is up to date"
